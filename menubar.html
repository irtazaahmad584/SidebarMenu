<!DOCTYPE html>
<html>
<head>
  <title>Sidebar Menu</title>

  <style>
    body {
      margin: 0;
      font-family: Arial;
    }

    /* Sidebar */
    .sidebar {
      height: 100vh;
      width: 200px;
      position: fixed;
      top: 0;
      left: 0;
      background-color: #111;
      padding-top: 20px;
    }

    /* Sidebar links */
    .sidebar a {
      padding: 10px 15px;
      text-decoration: none;
      font-size: 18px;
      color: white;
      display: block;
    }

    /* Hover effect */
    .sidebar a:hover {
      background-color: #575757;
    }

    /* Main content */
    .content {
      margin-left: 210px;
      padding: 20px;
    }
  </style>
</head>

<body>

  <!-- Sidebar -->
  <div class="sidebar">
    <a href="#">Home</a>
    <a href="#">About</a>
    <a href="#">Services</a>
    <a href="#">Contact</a>
  </div>

  <!-- Page Content -->
  <div class="content">
    <h1>My Website</h1>
    <p>This is main content area.</p>

  </div>

</body>
</html>
